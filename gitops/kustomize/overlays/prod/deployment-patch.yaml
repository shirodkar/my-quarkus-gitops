apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-quarkus-app
spec:
  template:
    spec:
      containers:
        - name: my-quarkus-app
          ports:
            - containerPort: 8082
          resources:
            requests:
              cpu: 20m
              memory: 200Mi
            limits:
              cpu: 1000m
              memory: 1024Mi